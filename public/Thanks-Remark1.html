<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Successful — PolyCoach</title>
<link rel="stylesheet" href="/css/Home-Page.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
.ty-body{background-image:linear-gradient(rgba(11,41,77,0.82),rgba(11,41,77,0.68)),url('/Images/Mzuzu.jpg');background-size:cover;background-position:center;min-height:85vh;display:flex;align-items:center;justify-content:center;padding:40px 16px;}
.success-card{background:#fff;padding:52px 40px;border-radius:20px;box-shadow:0 20px 50px rgba(0,0,0,0.3);max-width:520px;width:100%;text-align:center;}
.success-icon i{font-size:5rem;color:var(--success);}
.success-card h1{font-family:'Barlow Condensed',sans-serif;color:var(--primary);font-size:2.4rem;font-weight:900;text-transform:uppercase;margin:18px 0 12px;}
.success-card p{color:#555;font-size:1.05rem;line-height:1.65;margin-bottom:28px;}
.action-btns{display:flex;flex-direction:column;gap:12px;}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:16px;font-weight:700;font-size:1rem;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:background 0.2s;}
.btn-primary:hover{background:#007acc;}
.btn-outline{background:none;color:var(--primary);border:2px solid var(--primary);border-radius:7px;padding:14px;font-weight:700;font-size:1rem;cursor:pointer;transition:all 0.2s;}
.btn-outline:hover{background:var(--primary);color:#fff;}
</style>
</head>
<body>
<div class="Home-Page-Header">
  <div class="Left-Header" onclick="location.href='Home-Page.html'"><img src="/Images/Logo1.png" class="Logo1" alt="Logo"><div class="Logo-Text">PolyCoach</div></div>
  <div class="Right-Header">
    <button class="Header-Button" onclick="location.href='Home-Page.html'">Home</button>
    <button class="Header-Button" onclick="location.href='Book-Login.html'">Book</button>
    <button class="Header-Button" onclick="location.href='Help.html'">Help</button>
    <button class="Register-Button" onclick="location.href='Register.html'">Register</button>
  </div>
</div>
<div class="ty-body">
  <div class="success-card">
    <div class="success-icon"><i class="fa-solid fa-circle-check"></i></div>
    <h1>Registration Successful!</h1>
    <p>Welcome to <strong>PolyCoach</strong>! Your account has been created. You may now proceed to reserve your seat or return home.</p>
    <div class="action-btns">
      <button class="btn-primary" onclick="location.href='Book-Login.html'">PROCEED TO BOOKING</button>
      <button class="btn-outline" onclick="location.href='Home-Page.html'">MAYBE LATER</button>
    </div>
  </div>
</div>
<div class="Home-Page-Footer">
  <div class="Home-Left-Footer"><img src="/Images/Logo3.png" class="Logo1" alt="Logo"><div class="Logo-Text1">PolyCoach</div></div>
  <div class="Home-Mid-Footer">
    <button class="Footer-Button" onclick="openPopup('about')">About Us</button>
    <button class="Footer-Button" onclick="openPopup('faq')">FAQs</button>
    <button class="Footer-Button" onclick="openPopup('contact')">Contact</button>
  </div>
  <div class="Home-Right-Footer"><div class="Footer-Text">Social Media:</div><div class="Social-Container">
    <a href="https://chat.whatsapp.com/IoxQg9cuzsI1FNG7Awt8Vj" target="_blank"><div class="Footer-Icons"><img src="/Images/Facebook.png"></div></a>
    <a href="https://chat.whatsapp.com/IoxQg9cuzsI1FNG7Awt8Vj" target="_blank"><div class="Footer-Icons"><img src="/Images/Whatsapp.png"></div></a>
  </div></div>
</div>
<div id="popupOverlay" class="popup-overlay"><div class="popup-box"><div id="popupContent"></div><button class="close-btn" onclick="closePopup()">Close</button></div></div>
<script src="/js/popup.js"></script>
</body>
</html>
